name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
  ORG_GRADLE_PROJECT_org.gradle.caching: "true"
  ORG_GRADLE_PROJECT_org.gradle.parallel: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set correct JAVA_HOME
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "Set JAVA_HOME to $JAVA_HOME"

      - name: Enable KVM group perms (for faster emulator if needed)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          echo "=== Freeing up disk space ==="
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf "/usr/local/share/boost" || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download Gradle Wrapper jar (if missing)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading Gradle Wrapper jar..."
            curl -L https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            echo "Verifying downloaded jar..."
            ls -la gradle/wrapper/gradle-wrapper.jar
            if [ ! -s gradle/wrapper/gradle-wrapper.jar ]; then
              echo "ERROR: Failed to download or verify Gradle Wrapper jar"
              exit 1
            fi
          else
            echo "Gradle Wrapper jar already exists."
          fi

      - name: Verify project structure
        run: |
          echo "=== Project Root ==="
          ls -la
          echo "=== App Directory ==="
          ls -la app/
          echo "=== Main Source Directory ==="
          ls -la app/src/main/
          echo "=== Java/Kotlin Source Directory ==="
          ls -la app/src/main/java/
          echo "=== Resources Directory ==="
          ls -la app/src/main/res/
          echo "=== Gradle Wrapper ==="
          ls -la gradle/wrapper/

      - name: Clean previous builds and Gradle cache
        run: |
          ./gradlew clean --no-daemon || true
          rm -rf ~/.gradle/caches/build-cache-* || true

      - name: Verify SDK packages installed
        run: |
          echo "=== Installed SDK packages ==="
          sdkmanager --list_installed || true
          echo "=== Available disk space ==="
          df -h

      - name: Build Android Unsigned Release APK
        run: |
          echo "Building unsigned release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace
          echo "Build completed."

      - name: Verify APK outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Listing release output directory ==="
          ls -la app/build/outputs/apk/release/ || true

          shopt -s nullglob globstar
          apk_files=(app/build/outputs/apk/release/**/*.apk)

          if [ ${#apk_files[@]} -eq 0 ]; then
            echo "ERROR: No APK files were produced under app/build/outputs/apk/release/."
            exit 1
          fi

          echo "=== Found ${#apk_files[@]} APK file(s) ==="
          printf ' - %s\n' "${apk_files[@]}"
          
          # Display APK file sizes
          for apk in "${apk_files[@]}"; do
            echo "APK: $apk ($(du -h "$apk" | cut -f1))"
          done

      - name: Upload Release APK Artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned-apk
          path: app/build/outputs/apk/release/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create APK checksums
        run: |
          cd app/build/outputs/apk/release/
          for apk in *.apk; do
            if [ -f "$apk" ]; then
              sha256sum "$apk" > "${apk}.sha256"
              echo "Created checksum for $apk"
            fi
          done
          ls -la

      - name: Upload APK Checksums
        uses: actions/upload-artifact@v4
        with:
          name: app-release-checksums
          path: app/build/outputs/apk/release/**/*.sha256
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup Gradle Cache
        if: always()
        run: |
          echo "Cleaning up Gradle cache to save disk space..."
          rm -rf ~/.gradle/caches
          rm -rf .gradle
          echo "Cleanup completed."
